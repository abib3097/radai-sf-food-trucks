version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}
    volumes:
      - ./backend/app/data:/app/app/data

  frontend:
    build:
      context: ./frontend
      args:
        # The browser makes API calls directly to localhost:8000 —
        # not via Docker's internal network — so we use localhost here.
        VITE_API_BASE_URL: http://localhost:8000
        VITE_GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
    ports:
      - "5173:5173"
    depends_on:
      - backend